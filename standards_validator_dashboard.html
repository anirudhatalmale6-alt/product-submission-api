<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PetHub Standards Validator Status - Phase 16</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080a0f;
    --card-bg: #111621;
    --border: #1a2236;
    --text: #e2e8f0;
    --dim: #7a8ba8;
    --accent: #f59e0b;
    --accent-dim: rgba(245, 158, 11, 0.15);
    --accent-glow: rgba(245, 158, 11, 0.08);
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
    --blue: #3b82f6;
    --purple: #8b5cf6;
    --orange: #f97316;
    --cyan: #06b6d4;
    --font: 'Outfit', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    line-height: 1.6;
    min-height: 100vh;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }

  /* Animations */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-30px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes barGrow {
    from { width: 0; }
  }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.2); }
    50% { box-shadow: 0 0 20px 4px rgba(245, 158, 11, 0.1); }
  }
  @keyframes countUp {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  .animate-in {
    animation: fadeInUp 0.6s ease-out forwards;
    opacity: 0;
  }
  .animate-slide {
    animation: slideInLeft 0.5s ease-out forwards;
    opacity: 0;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    animation: fadeInUp 0.4s ease-out;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header-icon {
    width: 48px;
    height: 48px;
    background: var(--accent-dim);
    border: 1px solid rgba(245, 158, 11, 0.3);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .header h1 span {
    color: var(--accent);
  }
  .header-sub {
    font-size: 13px;
    color: var(--dim);
    font-weight: 400;
    margin-top: 2px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .badge-13pt {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-dim);
    border: 1px solid rgba(245, 158, 11, 0.3);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    font-family: var(--mono);
    animation: pulseGlow 3s ease-in-out infinite;
  }
  .badge-13pt svg {
    width: 14px;
    height: 14px;
  }
  .phase-badge {
    background: rgba(139, 92, 246, 0.12);
    border: 1px solid rgba(139, 92, 246, 0.3);
    color: var(--purple);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 600;
    font-family: var(--mono);
    letter-spacing: 0.5px;
  }

  /* Section titles */
  .section-title {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--dim);
    font-family: var(--mono);
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .section-title .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }

  /* Cards */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
  }

  /* Stats bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.2s;
  }
  .stat-card:hover {
    border-color: rgba(245, 158, 11, 0.3);
    transform: translateY(-2px);
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.5;
  }
  .stat-card.highlight::before {
    opacity: 1;
    height: 3px;
  }
  .stat-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--dim);
    font-family: var(--mono);
    margin-bottom: 8px;
  }
  .stat-value {
    font-size: 36px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
    font-family: var(--font);
    animation: countUp 0.8s ease-out;
  }
  .stat-value.score {
    font-size: 42px;
  }
  .stat-value.green { color: var(--green); }
  .stat-value.amber { color: var(--accent); }
  .stat-value.red { color: var(--red); }
  .stat-suffix {
    font-size: 16px;
    font-weight: 500;
    color: var(--dim);
  }
  .stat-detail {
    font-size: 12px;
    color: var(--dim);
    margin-top: 6px;
  }

  /* Score Distribution */
  .score-dist-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .score-row {
    display: grid;
    grid-template-columns: 90px 1fr 50px;
    align-items: center;
    gap: 14px;
  }
  .score-label {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--dim);
    text-align: right;
  }
  .score-bar-container {
    height: 28px;
    background: rgba(255,255,255,0.03);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }
  .score-bar {
    height: 100%;
    border-radius: 6px;
    animation: barGrow 1s ease-out forwards;
    display: flex;
    align-items: center;
    padding-left: 10px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    min-width: 2px;
  }
  .score-count {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    text-align: right;
  }

  /* Failure cards */
  .failure-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  .failure-card {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    transition: border-color 0.3s, background 0.3s;
  }
  .failure-card:hover {
    border-color: rgba(245, 158, 11, 0.25);
    background: rgba(255,255,255,0.03);
  }
  .failure-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .failure-name {
    font-weight: 600;
    font-size: 14px;
    color: var(--text);
  }
  .severity-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    font-family: var(--mono);
  }
  .severity-critical {
    background: rgba(239, 68, 68, 0.15);
    color: #f87171;
    border: 1px solid rgba(239, 68, 68, 0.3);
  }
  .severity-high {
    background: rgba(249, 115, 22, 0.15);
    color: #fb923c;
    border: 1px solid rgba(249, 115, 22, 0.3);
  }
  .severity-medium {
    background: rgba(245, 158, 11, 0.15);
    color: #fbbf24;
    border: 1px solid rgba(245, 158, 11, 0.3);
  }
  .severity-low {
    background: rgba(59, 130, 246, 0.12);
    color: #60a5fa;
    border: 1px solid rgba(59, 130, 246, 0.25);
  }
  .failure-desc {
    font-size: 12px;
    color: var(--dim);
    margin-bottom: 10px;
  }
  .failure-stats {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
  }
  .failure-count {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }
  .failure-pct {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--dim);
  }
  .failure-bar-bg {
    height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    overflow: hidden;
  }
  .failure-bar-fill {
    height: 100%;
    border-radius: 3px;
    animation: barGrow 1.2s ease-out forwards;
  }

  /* Alert card */
  .alert-card {
    background: rgba(59, 130, 246, 0.06);
    border: 1px solid rgba(59, 130, 246, 0.2);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .alert-icon {
    width: 36px;
    height: 36px;
    background: rgba(59, 130, 246, 0.15);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 18px;
    color: var(--blue);
  }
  .alert-content h3 {
    font-size: 14px;
    font-weight: 600;
    color: #93c5fd;
    margin-bottom: 6px;
  }
  .alert-content p {
    font-size: 13px;
    color: var(--dim);
    line-height: 1.7;
  }
  .alert-tags {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .alert-tag {
    background: rgba(59, 130, 246, 0.1);
    border: 1px solid rgba(59, 130, 246, 0.2);
    color: #93c5fd;
    font-family: var(--mono);
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 4px;
    font-weight: 500;
  }

  /* 13 point standard list */
  .standard-list {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .standard-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 8px;
    transition: background 0.2s;
  }
  .standard-item:hover {
    background: rgba(255,255,255,0.04);
  }
  .standard-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .standard-icon.pass {
    background: rgba(16, 185, 129, 0.15);
    color: var(--green);
    border: 1px solid rgba(16, 185, 129, 0.3);
  }
  .standard-icon.fail {
    background: rgba(239, 68, 68, 0.12);
    color: var(--red);
    border: 1px solid rgba(239, 68, 68, 0.25);
  }
  .standard-icon.fp {
    background: rgba(59, 130, 246, 0.12);
    color: var(--blue);
    border: 1px solid rgba(59, 130, 246, 0.25);
  }
  .standard-text {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }
  .standard-text .sub {
    display: block;
    font-size: 11px;
    font-weight: 400;
    color: var(--dim);
    margin-top: 1px;
  }
  .standard-number {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
    min-width: 20px;
  }

  /* Table */
  .remediation-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .remediation-table thead th {
    text-align: left;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--dim);
    font-family: var(--mono);
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  .remediation-table tbody tr {
    border-bottom: 1px solid rgba(26, 34, 54, 0.5);
    transition: background 0.2s;
  }
  .remediation-table tbody tr:hover {
    background: rgba(255,255,255,0.02);
  }
  .remediation-table td {
    padding: 12px 12px;
    vertical-align: middle;
  }
  .post-id {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--dim);
  }
  .post-slug {
    font-weight: 500;
    color: var(--text);
    font-size: 13px;
  }
  .score-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .score-mini-bar {
    width: 60px;
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
  }
  .score-mini-fill {
    height: 100%;
    border-radius: 3px;
  }
  .score-num {
    font-family: var(--mono);
    font-weight: 600;
    font-size: 13px;
  }
  .fail-badges {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .fail-badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 4px;
    background: rgba(239, 68, 68, 0.1);
    color: #f87171;
    border: 1px solid rgba(239, 68, 68, 0.2);
  }
  .priority-num {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 14px;
    color: var(--accent);
  }

  /* Priority cards */
  .priority-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .priority-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.2s;
  }
  .priority-card:hover {
    transform: translateY(-3px);
    border-color: rgba(245, 158, 11, 0.35);
  }
  .priority-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
  }
  .priority-card.p1::before { background: var(--red); }
  .priority-card.p2::before { background: var(--orange); }
  .priority-card.p3::before { background: var(--yellow); }
  .priority-rank {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .priority-rank-num {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 4px;
  }
  .p1 .priority-rank-num {
    background: rgba(239, 68, 68, 0.15);
    color: #f87171;
    border: 1px solid rgba(239, 68, 68, 0.3);
  }
  .p2 .priority-rank-num {
    background: rgba(249, 115, 22, 0.15);
    color: #fb923c;
    border: 1px solid rgba(249, 115, 22, 0.3);
  }
  .p3 .priority-rank-num {
    background: rgba(245, 158, 11, 0.15);
    color: #fbbf24;
    border: 1px solid rgba(245, 158, 11, 0.3);
  }
  .priority-impact {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(16, 185, 129, 0.12);
    color: #34d399;
    border: 1px solid rgba(16, 185, 129, 0.25);
  }
  .priority-action {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .priority-action .highlight {
    color: var(--accent);
    font-family: var(--mono);
  }
  .priority-desc {
    font-size: 12px;
    color: var(--dim);
    margin-bottom: 16px;
    line-height: 1.6;
  }
  .priority-meta {
    display: flex;
    gap: 16px;
  }
  .priority-meta-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .priority-meta-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--dim);
    font-family: var(--mono);
  }
  .priority-meta-value {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  /* Two column layout */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  /* Responsive */
  @media (max-width: 1200px) {
    .stats-bar { grid-template-columns: repeat(3, 1fr); }
    .failure-grid { grid-template-columns: 1fr; }
    .priority-grid { grid-template-columns: 1fr; }
    .two-col { grid-template-columns: 1fr; }
    .standard-list { grid-template-columns: 1fr; }
  }
  @media (max-width: 768px) {
    body { padding: 12px; }
    .stats-bar { grid-template-columns: 1fr 1fr; }
    .header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .header-right { align-self: flex-start; }
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 24px 0 8px;
    font-size: 11px;
    color: rgba(122, 139, 168, 0.5);
    font-family: var(--mono);
    border-top: 1px solid var(--border);
    margin-top: 12px;
  }
</style>
</head>

<script>
(function() {
  const D = window.VALIDATOR_DATA;

  // Helper: score color
  function scoreColor(score) {
    if (score >= 90) return 'var(--green)';
    if (score >= 70) return '#22c55e';
    if (score >= 60) return 'var(--yellow)';
    if (score >= 50) return 'var(--orange)';
    return 'var(--red)';
  }
  function scoreClass(score) {
    if (score >= 80) return 'green';
    if (score >= 60) return 'amber';
    return 'red';
  }

  // Helper: severity bar color
  function severityBarColor(severity) {
    switch(severity) {
      case 'critical': return 'var(--red)';
      case 'high': return 'var(--orange)';
      case 'medium': return 'var(--yellow)';
      case 'low': return 'var(--blue)';
      default: return 'var(--dim)';
    }
  }

  // Helper: format check name
  function formatCheck(key) {
    return key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  // Map standard names to failure keys for pass/fail status
  const standardToKey = {
    "Table of Contents": "toc",
    "Author Box / Trust Footer": "author_box",
    "Focus Keyword (Rank Math)": "focus_keyword",
    "SEO Title (Rank Math)": "seo_title",
    "SEO Description (Rank Math)": "seo_desc",
    "4+ Images with Alt Text": "images_below_4",
    "3+ Internal Links": "internal_links_low",
    "FAQ Section": "faq",
    "Key Terms / Glossary": "key_terms",
    "Sources / References": "sources",
    "Affiliate Disclosure": "affiliate_disclosure",
    "Call-to-Action": "cta",
    "Recommended Products / Comparison Table": "recommended_products"
  };

  // Standard descriptions
  const standardDescs = {
    "Table of Contents": "Clickable TOC for long-form content navigation",
    "Author Box / Trust Footer": "Author bio with credentials for E-E-A-T",
    "Focus Keyword (Rank Math)": "Primary keyword set in Rank Math SEO plugin",
    "SEO Title (Rank Math)": "Custom SEO title with keyword placement",
    "SEO Description (Rank Math)": "Meta description optimized for CTR",
    "4+ Images with Alt Text": "Minimum 4 images with descriptive alt attributes",
    "3+ Internal Links": "Cross-links to related hub and pillar content",
    "FAQ Section": "Structured FAQ for featured snippet eligibility",
    "Key Terms / Glossary": "Glossary section for topical authority signals",
    "Sources / References": "Cited sources for trust and credibility",
    "Affiliate Disclosure": "FTC-compliant affiliate disclosure statement",
    "Call-to-Action": "Product CTA buttons driving conversion",
    "Recommended Products / Comparison Table": "Product comparison for purchase decisions"
  };

  // Score distribution data
  const distLabels = ['100%', '90-99%', '80-89%', '70-79%', '60-69%', '50-59%', '<50%'];
  const distKeys = ['100', '90-99', '80-89', '70-79', '60-69', '50-59', 'below_50'];
  const distColors = ['#10b981', '#22c55e', '#84cc16', '#eab308', '#f59e0b', '#f97316', '#ef4444'];
  const maxDist = Math.max(...distKeys.map(k => D.score_distribution[k]));

  // Build sorted real failures
  const realFailures = Object.entries(D.real_failure_breakdown)
    .sort((a, b) => b[1].count - a[1].count);

  // Delay helper for staggered animations
  function delay(i, base) { return `animation-delay: ${base + i * 0.08}s;`; }

  let html = '';

  // === HEADER ===
  html += `
  <div class="header">
    <div class="header-left">
      <div class="header-icon">
        <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="color:var(--accent)">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <div>
        <h1>PetHub <span>Standards Validator</span></h1>
        <div class="header-sub">Phase 16 -- Permanent Standards Enforcement</div>
      </div>
    </div>
    <div class="header-right">
      <span class="phase-badge">PHASE 16</span>
      <span class="badge-13pt">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
        13-POINT QUALITY STANDARD
      </span>
    </div>
  </div>`;

  // === SECTION 1: STANDARDS OVERVIEW ===
  html += `
  <div class="section-title animate-in" style="animation-delay:0.1s"><span class="dot"></span> Standards Overview</div>
  <div class="stats-bar">
    <div class="stat-card animate-in" style="animation-delay:0.15s">
      <div class="stat-label">Total Posts</div>
      <div class="stat-value">${D.total_posts}</div>
      <div class="stat-detail">Content library</div>
    </div>
    <div class="stat-card highlight animate-in" style="animation-delay:0.2s">
      <div class="stat-label">Average Score</div>
      <div class="stat-value score ${scoreClass(D.average_score)}">${D.average_score}<span class="stat-suffix">%</span></div>
      <div class="stat-detail">Across all posts</div>
    </div>
    <div class="stat-card animate-in" style="animation-delay:0.25s">
      <div class="stat-label">Perfect Score</div>
      <div class="stat-value ${D.perfect_score > 0 ? 'green' : 'red'}">${D.perfect_score}</div>
      <div class="stat-detail">100% compliant</div>
    </div>
    <div class="stat-card animate-in" style="animation-delay:0.3s">
      <div class="stat-label">Need Remediation</div>
      <div class="stat-value red">${D.remediation_count}</div>
      <div class="stat-detail">Posts below 100%</div>
    </div>
    <div class="stat-card animate-in" style="animation-delay:0.35s">
      <div class="stat-label">Last Run</div>
      <div class="stat-value" style="font-size:22px;font-family:var(--mono);letter-spacing:-0.5px">${D.timestamp}</div>
      <div class="stat-detail">Validator scan</div>
    </div>
  </div>`;

  // === SECTION 2: SCORE DISTRIBUTION ===
  html += `
  <div class="section-title animate-in" style="animation-delay:0.4s"><span class="dot"></span> Score Distribution</div>
  <div class="card animate-in" style="animation-delay:0.45s">
    <div class="score-dist-grid">`;
  distKeys.forEach((key, i) => {
    const val = D.score_distribution[key];
    const pct = maxDist > 0 ? (val / maxDist) * 100 : 0;
    html += `
      <div class="score-row" style="${delay(i, 0.5)}">
        <div class="score-label">${distLabels[i]}</div>
        <div class="score-bar-container">
          <div class="score-bar" style="width:${Math.max(pct, val > 0 ? 3 : 0)}%;background:${distColors[i]};animation-delay:${0.5 + i * 0.1}s">
            ${val > 10 ? val : ''}
          </div>
        </div>
        <div class="score-count">${val}</div>
      </div>`;
  });
  html += `
    </div>
  </div>`;

  // === SECTION 3: REAL FAILURE BREAKDOWN ===
  html += `
  <div class="section-title animate-in" style="animation-delay:0.9s"><span class="dot"></span> Real Failure Breakdown <span style="font-weight:400;letter-spacing:0;text-transform:none;margin-left:6px;font-size:10px;color:rgba(122,139,168,0.6)">(excludes false positives)</span></div>
  <div class="card animate-in" style="animation-delay:0.95s">
    <div class="failure-grid">`;
  realFailures.forEach(([key, data], i) => {
    html += `
      <div class="failure-card animate-slide" style="${delay(i, 1.0)}">
        <div class="failure-header">
          <span class="failure-name">${formatCheck(key)}</span>
          <span class="severity-badge severity-${data.severity}">${data.severity}</span>
        </div>
        <div class="failure-desc">${data.desc}</div>
        <div class="failure-stats">
          <span class="failure-count">${data.count}</span>
          <span class="failure-pct">${data.pct}% of posts</span>
        </div>
        <div class="failure-bar-bg">
          <div class="failure-bar-fill" style="width:${data.pct}%;background:${severityBarColor(data.severity)};animation-delay:${1.0 + i * 0.1}s"></div>
        </div>
      </div>`;
  });
  html += `
    </div>
  </div>`;

  // === SECTION 4: FALSE POSITIVE NOTICE ===
  html += `
  <div class="animate-in" style="animation-delay:1.8s">
    <div class="alert-card">
      <div class="alert-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <div class="alert-content">
        <h3>False Positive Notice</h3>
        <p>Three checks report 100% failure (263/263 posts) because <strong>Rank Math SEO meta fields</strong> are not exposed through the WordPress REST API. These fields are configured directly in the Rank Math plugin dashboard and cannot be validated by the external content scanner. They are excluded from the real failure breakdown and tracked separately via Rank Math's internal reporting.</p>
        <div class="alert-tags">
          ${D.known_false_positives.map(fp => `<span class="alert-tag">${formatCheck(fp)}</span>`).join('')}
        </div>
      </div>
    </div>
  </div>`;

  // === SECTION 5: THE 13-POINT STANDARD ===
  html += `
  <div class="section-title animate-in" style="animation-delay:1.9s"><span class="dot"></span> The 13-Point Standard</div>
  <div class="card animate-in" style="animation-delay:1.95s">
    <div class="standard-list">`;
  D.thirteen_point_standard.forEach((name, i) => {
    const key = standardToKey[name];
    const isFP = D.known_false_positives.includes(key);
    const failCount = D.failure_breakdown[key] || 0;
    const isPass = failCount === 0;
    let iconClass, iconSymbol;
    if (isFP) {
      iconClass = 'fp';
      iconSymbol = '~';
    } else if (isPass) {
      iconClass = 'pass';
      iconSymbol = '&#10003;';
    } else {
      iconClass = 'fail';
      iconSymbol = '&#10007;';
    }
    const desc = standardDescs[name] || '';
    const statusText = isFP ? 'False positive' : (isPass ? 'Passing' : `${failCount} failing`);
    html += `
      <div class="standard-item animate-slide" style="${delay(i, 2.0)}">
        <span class="standard-number">${String(i+1).padStart(2,'0')}</span>
        <div class="standard-icon ${iconClass}">${iconSymbol}</div>
        <div class="standard-text">
          ${name}
          <span class="sub">${desc} &middot; ${statusText}</span>
        </div>
      </div>`;
  });
  html += `
    </div>
  </div>`;

  // === SECTION 6: REMEDIATION QUEUE ===
  html += `
  <div class="section-title animate-in" style="animation-delay:3.0s"><span class="dot"></span> Remediation Queue <span style="font-weight:400;letter-spacing:0;text-transform:none;margin-left:6px;font-size:10px;color:rgba(122,139,168,0.6)">(top posts needing attention)</span></div>
  <div class="card animate-in" style="animation-delay:3.05s">
    <table class="remediation-table">
      <thead>
        <tr>
          <th>Priority</th>
          <th>Post ID</th>
          <th>Slug</th>
          <th>Score</th>
          <th>Failing Checks</th>
        </tr>
      </thead>
      <tbody>`;
  D.remediation_queue_sample.forEach((post, i) => {
    const color = scoreColor(post.score);
    html += `
        <tr class="animate-slide" style="${delay(i, 3.1)}">
          <td><span class="priority-num">#${i+1}</span></td>
          <td><span class="post-id">${post.id}</span></td>
          <td><span class="post-slug">${post.slug}</span></td>
          <td>
            <div class="score-cell">
              <span class="score-num" style="color:${color}">${post.score}%</span>
              <div class="score-mini-bar">
                <div class="score-mini-fill" style="width:${post.score}%;background:${color}"></div>
              </div>
            </div>
          </td>
          <td>
            <div class="fail-badges">
              ${post.fails.map(f => `<span class="fail-badge">${formatCheck(f)}</span>`).join('')}
            </div>
          </td>
        </tr>`;
  });
  html += `
      </tbody>
    </table>
  </div>`;

  // === SECTION 7: REMEDIATION PRIORITY ===
  const priorities = [
    {
      rank: 1, cls: 'p1', action: 'Add CTAs to <span class="highlight">242</span> posts',
      desc: 'Call-to-action buttons are the primary conversion driver. 92% of posts lack CTAs, making this the highest-impact remediation. Each CTA block includes product recommendation links and affiliate tracking.',
      effort: '~3 hours', impact: 'Critical', score: '+8-12 pts avg'
    },
    {
      rank: 2, cls: 'p2', action: 'Add TOC to <span class="highlight">176</span> posts',
      desc: 'Table of contents improves user experience, reduces bounce rate, and enables jump links in Google search results. Can be automated with a shortcode or plugin for bulk insertion.',
      effort: '~1 hour', impact: 'High', score: '+5-8 pts avg'
    },
    {
      rank: 3, cls: 'p3', action: 'Add images to <span class="highlight">102</span> posts',
      desc: 'Posts with fewer than 4 images score lower on visual engagement. Adding product photos, comparison charts, and infographics improves dwell time and image search visibility.',
      effort: '~6 hours', impact: 'Medium', score: '+4-6 pts avg'
    }
  ];

  html += `
  <div class="section-title animate-in" style="animation-delay:3.6s"><span class="dot"></span> Remediation Priority</div>
  <div class="priority-grid">`;
  priorities.forEach((p, i) => {
    html += `
    <div class="priority-card ${p.cls} animate-in" style="animation-delay:${3.65 + i * 0.1}s">
      <div class="priority-rank">
        <span class="priority-rank-num">Priority #${p.rank}</span>
        <span class="priority-impact">${p.impact} impact</span>
      </div>
      <div class="priority-action">${p.action}</div>
      <div class="priority-desc">${p.desc}</div>
      <div class="priority-meta">
        <div class="priority-meta-item">
          <span class="priority-meta-label">Est. Effort</span>
          <span class="priority-meta-value">${p.effort}</span>
        </div>
        <div class="priority-meta-item">
          <span class="priority-meta-label">Score Impact</span>
          <span class="priority-meta-value">${p.score}</span>
        </div>
        <div class="priority-meta-item">
          <span class="priority-meta-label">Posts</span>
          <span class="priority-meta-value">${p.action.match(/\d+/)[0]}</span>
        </div>
      </div>
    </div>`;
  });
  html += `
  </div>`;

  // Footer
  html += `
  <div class="footer animate-in" style="animation-delay:4.0s">
    PetHub Standards Validator &middot; Phase 16 Permanent Standards &middot; 13-Point Quality Standard &middot; ${D.timestamp}
  </div>`;

  document.getElementById('app').innerHTML = html;
})();
</script>

</body>
</html>
