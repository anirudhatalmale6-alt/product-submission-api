    - type: Review
      requires: evidence_status_approved_for_live_use
      gate: SA-05_Product_Evidence_Agent

    - type: AggregateRating
      requires: evidence_status_approved_for_live_use
      gate: SA-05_Product_Evidence_Agent

    - type: Offer
      requires: evidence_status_approved_for_live_use + price_verification
